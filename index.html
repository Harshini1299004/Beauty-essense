<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beauty Essence | Mohana Kalyani — Home Beauty Services</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blush:#F7E0E6;--blush-light:#FDF3F5;--blush-mid:#F0C8D4;
  --rose:#C4849A;--rose-dark:#9B5C73;--rose-gold:#C8977A;
  --white:#FFFFFF;--cream:#FDF8F9;
  --text-dark:#2E1A22;--text-mid:#6B4455;--text-light:#A07585;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Jost',sans-serif;
  --wa:#25D366;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);color:var(--text-dark);background:var(--white);overflow-x:hidden;opacity:0;animation:bodyReveal 1s ease 0.1s forwards}
@keyframes bodyReveal{from{opacity:0}to{opacity:1}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--blush-light)}
::-webkit-scrollbar-thumb{background:var(--rose);border-radius:3px}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 60px;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(24px) saturate(200%);
  -webkit-backdrop-filter:blur(24px) saturate(200%);
  border-bottom:1px solid rgba(255,255,255,0.5);
  box-shadow:0 2px 24px rgba(196,132,154,0.08);
  transition:padding 0.3s,box-shadow 0.3s}
nav.scrolled{padding:13px 60px;box-shadow:0 4px 30px rgba(196,132,154,0.14)}
.nav-logo{font-family:var(--serif);font-size:1.65rem;font-weight:600;color:var(--text-dark);text-decoration:none;letter-spacing:0.02em}
.nav-logo span{color:var(--rose)}
.nav-links{display:flex;gap:34px;list-style:none;align-items:center}
.nav-links a{font-size:0.8rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-mid);text-decoration:none;position:relative;transition:color 0.3s}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--rose);transition:width 0.3s}
.nav-links a:hover{color:var(--rose-dark)}.nav-links a:hover::after{width:100%}
.nav-cta{background:var(--rose)!important;color:var(--white)!important;padding:9px 22px!important;border-radius:30px;transition:background 0.3s,transform 0.2s!important}
.nav-cta::after{display:none!important}.nav-cta:hover{background:var(--rose-dark)!important;transform:translateY(-1px)}
.nav-hiring{color:var(--rose-dark)!important;font-weight:600!important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{display:block;width:24px;height:2px;background:var(--rose-dark);border-radius:2px;transition:0.3s}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);padding:28px 28px 36px;flex-direction:column;gap:0;z-index:99;border-bottom:1px solid rgba(196,132,154,0.15)}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:0.95rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-mid);text-decoration:none;padding:16px 0;border-bottom:1px solid rgba(196,132,154,0.1);display:block;transition:color 0.3s}
.mobile-menu a:hover{color:var(--rose)}
.mobile-menu .m-book{margin-top:20px;background:var(--rose);color:var(--white)!important;text-align:center;border-radius:30px;padding:14px!important;border:none}
.mobile-menu .m-hiring{color:var(--rose-dark)!important;font-weight:600!important}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;align-items:center;background:linear-gradient(135deg,#FDF0F3 0%,#FBE5EC 45%,#F5D0DC 100%);position:relative;overflow:hidden;padding:120px 60px 80px}
.hero::before{content:'';position:absolute;top:-120px;right:-100px;width:520px;height:520px;background:radial-gradient(circle,rgba(196,132,154,0.18) 0%,transparent 70%);border-radius:50%;animation:float 7s ease-in-out infinite}
.hero::after{content:'';position:absolute;bottom:-80px;left:-80px;width:380px;height:380px;background:radial-gradient(circle,rgba(200,151,122,0.13) 0%,transparent 70%);border-radius:50%;animation:float 9s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.hero-content{position:relative;z-index:2;max-width:620px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(196,132,154,0.12);border:1px solid rgba(196,132,154,0.3);border-radius:30px;padding:7px 18px;font-size:0.77rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--rose-dark);margin-bottom:26px;animation:fadeUp 0.8s ease both}
.hero h1{font-family:var(--serif);font-size:clamp(2.8rem,6vw,5rem);font-weight:400;line-height:1.12;color:var(--text-dark);margin-bottom:22px;animation:fadeUp 0.8s 0.15s ease both}
.hero h1 em{font-style:italic;color:var(--rose)}
.hero-tagline{font-size:1rem;font-weight:300;color:var(--text-mid);line-height:1.8;margin-bottom:40px;max-width:470px;animation:fadeUp 0.8s 0.28s ease both}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap;animation:fadeUp 0.8s 0.4s ease both}
.btn-primary{display:inline-flex;align-items:center;gap:10px;background:var(--rose);color:var(--white);padding:15px 34px;border-radius:50px;font-size:0.87rem;font-weight:500;letter-spacing:0.07em;text-decoration:none;border:none;cursor:pointer;transition:background 0.3s,transform 0.2s,box-shadow 0.3s;box-shadow:0 8px 28px rgba(196,132,154,0.4)}
.btn-primary:hover{background:var(--rose-dark);transform:translateY(-2px);box-shadow:0 14px 36px rgba(196,132,154,0.5)}
.btn-outline{display:inline-flex;align-items:center;gap:10px;background:transparent;color:var(--rose-dark);padding:15px 34px;border-radius:50px;font-size:0.87rem;font-weight:500;letter-spacing:0.07em;text-decoration:none;border:1.5px solid var(--rose);cursor:pointer;transition:background 0.3s,color 0.3s,transform 0.2s}
.btn-outline:hover{background:var(--rose);color:var(--white);transform:translateY(-2px)}
.hero-stats{display:flex;gap:36px;margin-top:50px;animation:fadeUp 0.8s 0.52s ease both}
.stat-num{font-family:var(--serif);font-size:1.9rem;font-weight:600;color:var(--rose-dark);display:block}
.stat-label{font-size:0.73rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-light);margin-top:3px}
.hero-card{position:absolute;right:7%;top:50%;transform:translateY(-50%);border-radius:24px;padding:30px 26px;width:270px;animation:fadeUp 0.8s 0.6s ease both;z-index:2}
.hero-card-title{font-family:var(--serif);font-size:1.05rem;font-weight:500;color:var(--text-dark);margin-bottom:16px}
.service-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(247,224,230,0.8);border-radius:20px;padding:7px 13px;font-size:0.8rem;color:var(--rose-dark);font-weight:500;margin:3px;border:1px solid rgba(255,255,255,0.5)}
.hero-card-hours{margin-top:18px;padding-top:18px;border-top:1px solid rgba(240,200,212,0.4);font-size:0.82rem}
.hours-label{color:var(--text-light);margin-bottom:5px}
.hours-val{color:var(--text-dark);font-weight:500}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTION BASE ── */
section{padding:88px 60px}
.section-label{display:inline-block;font-size:0.73rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--rose);font-weight:600;margin-bottom:12px}
.section-title{font-family:var(--serif);font-size:clamp(1.9rem,3.5vw,2.9rem);font-weight:400;color:var(--text-dark);line-height:1.2;margin-bottom:16px}
.section-sub{font-size:0.97rem;color:var(--text-light);font-weight:300;line-height:1.8;max-width:520px}
.text-center{text-align:center}.text-center .section-sub{margin:0 auto}

/* ── SERVICES ── */
#services{background:var(--cream)}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;margin-top:50px}
.service-card{background:var(--white);border-radius:20px;padding:34px 26px;border:1px solid rgba(196,132,154,0.12);transition:transform 0.4s cubic-bezier(.17,.67,.32,1),box-shadow 0.3s,border-color 0.3s;position:relative;overflow:hidden}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--rose-gold));transform:scaleX(0);transition:transform 0.4s;transform-origin:left}
.service-card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 28px 60px rgba(196,132,154,0.2);border-color:rgba(196,132,154,0.28)}
.service-card:hover::before{transform:scaleX(1)}
.service-icon{width:58px;height:58px;background:var(--blush);border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:20px;transition:background 0.3s,transform 0.3s}
.service-card:hover .service-icon{background:var(--blush-mid);transform:rotate(-5deg) scale(1.1)}
.service-name{font-family:var(--serif);font-size:1.3rem;font-weight:500;color:var(--text-dark);margin-bottom:9px}
.service-desc{font-size:0.86rem;color:var(--text-light);line-height:1.75}
.service-list{margin-top:14px;list-style:none;display:flex;flex-wrap:wrap;gap:7px}
.service-list li{background:var(--blush-light);color:var(--text-mid);font-size:0.75rem;padding:4px 11px;border-radius:20px;font-weight:500}

/* ── ABOUT ── */
#about{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
.about-visual{position:relative}
.about-img-box{border-radius:30px;height:480px;position:relative;overflow:hidden;box-shadow:0 30px 80px rgba(155,92,115,0.2)}
.exp-badge{position:absolute;top:22px;left:22px;border-radius:18px;padding:16px 20px;z-index:3;text-align:center}
.exp-badge .exp-num{font-family:var(--serif);font-size:2.4rem;font-weight:600;color:var(--rose-dark);line-height:1;display:block}
.exp-badge .exp-txt{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-mid);font-weight:600;display:block;margin-top:2px}
.owner-card{position:absolute;bottom:-18px;right:-18px;border-radius:18px;padding:18px 22px;min-width:190px;z-index:3}
.owner-name{font-family:var(--serif);font-size:1.15rem;font-weight:600;color:var(--text-dark)}
.owner-title{font-size:0.75rem;color:var(--rose);font-weight:500;letter-spacing:0.06em;margin-top:3px}
.owner-stars{color:#E8A87C;font-size:0.8rem;letter-spacing:2px;margin-top:6px}
.about-content .section-sub{max-width:100%;margin-bottom:18px}
.about-features{list-style:none;display:flex;flex-direction:column;gap:12px;margin-top:24px}
.about-features li{display:flex;align-items:flex-start;gap:13px;font-size:0.88rem;color:var(--text-mid);line-height:1.6}
.about-features li::before{content:'✦';color:var(--rose);font-size:0.73rem;margin-top:3px;flex-shrink:0}

/* ── WHY ── */
#why{background:linear-gradient(135deg,var(--blush-light),var(--cream))}
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:24px;margin-top:50px}
.why-card{text-align:center;padding:34px 18px;border-radius:20px;border:1px solid rgba(255,255,255,0.5);transition:transform 0.4s cubic-bezier(.17,.67,.32,1),box-shadow 0.3s}
.why-card:hover{transform:translateY(-8px) scale(1.03);box-shadow:0 22px 55px rgba(196,132,154,0.18)}
.why-icon{font-size:2.1rem;margin-bottom:14px;display:block;transition:transform 0.3s}
.why-card:hover .why-icon{transform:scale(1.2) rotate(5deg)}
.why-title{font-family:var(--serif);font-size:1.1rem;font-weight:500;color:var(--text-dark);margin-bottom:9px}
.why-text{font-size:0.83rem;color:var(--text-light);line-height:1.7}

/* ── TESTIMONIALS ── */
#testimonials{background:var(--white)}
.testimonials-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:22px;margin-top:50px}
.testimonial-card{background:var(--blush-light);border-radius:20px;padding:30px 26px;border:1px solid rgba(196,132,154,0.1);position:relative;transition:transform 0.4s cubic-bezier(.17,.67,.32,1),box-shadow 0.3s}
.testimonial-card:hover{transform:translateY(-6px);box-shadow:0 18px 48px rgba(196,132,154,0.16)}
.quote-mark{font-family:var(--serif);font-size:4.5rem;line-height:0.5;color:var(--blush-mid);margin-bottom:18px;display:block}
.testimonial-text{font-size:0.93rem;color:var(--text-mid);line-height:1.8;font-style:italic;font-family:var(--serif);font-weight:300;margin-bottom:22px}
.testimonial-author{display:flex;align-items:center;gap:12px}
.author-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;flex-shrink:0;color:var(--white);background:var(--rose)}
.author-name{font-weight:600;font-size:0.87rem;color:var(--text-dark)}
.author-service{font-size:0.73rem;color:var(--rose);font-weight:500;letter-spacing:0.04em;margin-top:2px}
.author-stars{font-size:0.72rem;color:#E8A87C;letter-spacing:2px;margin-top:2px}
.no-reviews{text-align:center;padding:48px;color:var(--text-light);font-style:italic;font-family:var(--serif);font-size:1.1rem}

/* ── BOOK / CTA ── */
#book{background:linear-gradient(135deg,#2E1A22 0%,#4D2C3D 100%);color:var(--white);text-align:center;position:relative;overflow:hidden}
#book::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(196,132,154,0.22),transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(200,151,122,0.13),transparent 60%)}
#book .section-label{color:var(--blush-mid)}
#book .section-title{color:var(--white)}
#book .section-sub{color:rgba(255,255,255,0.62);margin:0 auto 36px}
.book-content{position:relative;z-index:2}
.divider-line{width:70px;height:1px;background:linear-gradient(90deg,transparent,var(--rose),transparent);margin:22px auto}
.whatsapp-btn{display:inline-flex;align-items:center;gap:12px;background:var(--wa);color:var(--white);padding:17px 38px;border-radius:50px;font-size:0.97rem;font-weight:500;letter-spacing:0.05em;text-decoration:none;transition:background 0.3s,transform 0.2s,box-shadow 0.3s;box-shadow:0 10px 36px rgba(37,211,102,0.4);margin-bottom:20px}
.whatsapp-btn:hover{background:#1ebe5d;transform:translateY(-3px);box-shadow:0 18px 48px rgba(37,211,102,0.5)}
.book-note{font-size:0.8rem;color:rgba(255,255,255,0.42);letter-spacing:0.05em;margin-bottom:36px}
.review-prompt{border-radius:16px;padding:22px 28px;display:inline-block;margin-top:8px}
.review-prompt p{color:rgba(255,255,255,0.7);font-size:0.88rem;margin-bottom:14px}
.btn-review{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--blush-mid);border:1.5px solid rgba(196,132,154,0.45);padding:11px 26px;border-radius:30px;font-size:0.84rem;font-weight:500;text-decoration:none;cursor:pointer;transition:background 0.3s,color 0.3s,border-color 0.3s;font-family:var(--sans)}
.btn-review:hover{background:var(--rose);color:var(--white);border-color:var(--rose)}

/* ── REVIEW FORM ── */
#leave-review{background:var(--cream)}
.review-form-wrap{max-width:640px;margin:50px auto 0;background:var(--white);border-radius:24px;padding:44px;box-shadow:0 12px 48px rgba(155,92,115,0.1);border:1px solid rgba(196,132,154,0.12)}
.form-group{margin-bottom:22px}
.form-label{display:block;font-size:0.8rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-mid);margin-bottom:8px}
.form-input{width:100%;padding:13px 16px;border:1.5px solid rgba(196,132,154,0.25);border-radius:12px;font-family:var(--sans);font-size:0.9rem;color:var(--text-dark);background:var(--blush-light);transition:border-color 0.3s,box-shadow 0.3s;outline:none}
.form-input:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(196,132,154,0.15);background:var(--white)}
textarea.form-input{resize:vertical;min-height:110px;line-height:1.6}
select.form-input{cursor:pointer}
.stars-row{display:flex;gap:8px;margin-top:4px}
.star-btn{background:none;border:none;font-size:2rem;cursor:pointer;color:#D8C0C8;transition:color 0.2s,transform 0.1s;padding:2px;line-height:1}
.star-btn.lit{color:#E8A87C}
.star-btn:hover{transform:scale(1.15)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn-submit{width:100%;padding:15px;background:var(--rose);color:var(--white);border:none;border-radius:50px;font-family:var(--sans);font-size:0.95rem;font-weight:500;letter-spacing:0.07em;cursor:pointer;transition:background 0.3s,transform 0.2s,box-shadow 0.3s;margin-top:8px;box-shadow:0 8px 24px rgba(196,132,154,0.35)}
.btn-submit:hover{background:var(--rose-dark);transform:translateY(-2px);box-shadow:0 14px 32px rgba(196,132,154,0.45)}
.success-msg{display:none;text-align:center;padding:18px;background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.3);border-radius:14px;margin-top:20px;color:#1a7a42;font-weight:500;font-size:0.93rem}
.error-msg{display:none;text-align:center;padding:14px;background:rgba(196,84,84,0.08);border:1px solid rgba(196,84,84,0.25);border-radius:12px;margin-top:14px;color:#9B3C3C;font-size:0.87rem}

/* ── FOOTER ── */
footer{background:#1C1014;color:rgba(255,255,255,0.45);padding:44px 60px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px}
.footer-logo{font-family:var(--serif);font-size:1.45rem;font-weight:500;color:var(--white)}
.footer-logo span{color:var(--rose)}
.footer-tagline{font-size:0.77rem;color:rgba(255,255,255,0.3);margin-top:3px}
.footer-founder{font-size:0.77rem;color:rgba(255,255,255,0.35);margin-top:2px}
.footer-links{display:flex;gap:26px;list-style:none}
.footer-links a{font-size:0.8rem;color:rgba(255,255,255,0.42);text-decoration:none;letter-spacing:0.06em;transition:color 0.3s}
.footer-links a:hover{color:var(--rose)}
.footer-copy{font-size:0.75rem;text-align:right}

/* ── FADE-IN SCROLL ANIMATIONS ── */
.fade-in{opacity:0;transform:translateY(50px) scale(0.97);transition:opacity 0.8s cubic-bezier(.17,.67,.32,1),transform 0.8s cubic-bezier(.17,.67,.32,1)}
.fade-in.visible{opacity:1;transform:translateY(0) scale(1)}
.fade-left{opacity:0;transform:translateX(-50px);transition:opacity 0.8s ease,transform 0.8s ease}
.fade-left.visible{opacity:1;transform:translateX(0)}
.fade-right{opacity:0;transform:translateX(50px);transition:opacity 0.8s ease,transform 0.8s ease}
.fade-right.visible{opacity:1;transform:translateX(0)}
.fade-scale{opacity:0;transform:scale(0.88);transition:opacity 0.7s ease,transform 0.7s ease}
.fade-scale.visible{opacity:1;transform:scale(1)}

/* ── SCROLL PROGRESS ── */
.scroll-progress{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#C4849A,#C8977A);z-index:9999;transition:width 0.1s}

/* ── CURSOR GLOW ── */
.cursor-glow{position:fixed;width:260px;height:260px;border-radius:50%;background:rgba(196,132,154,.12);filter:blur(80px);pointer-events:none;z-index:1;transition:left 0.08s,top 0.08s}

/* ── PARALLAX ── */
.parallax{transform:translateY(var(--parallax,0px));will-change:transform}

/* ── COUNTER ── */
.counter{font-variant-numeric:tabular-nums}

/* ── HIRING PAGE OVERLAY ── */
#hiringPage{position:fixed;inset:0;z-index:200;overflow-y:auto;box-sizing:border-box;
  background:linear-gradient(140deg,#f9e8f0 0%,#f3d5e5 35%,#ead0df 70%,#f5e0eb 100%)!important;
  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
  transform:translateX(100%);transition:transform 0.5s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;align-items:center;padding:80px 20px 40px}
#hiringPage.open{transform:translateX(0)}
.hiring-close{position:fixed;top:22px;right:28px;background:var(--rose);color:var(--white);border:none;border-radius:50%;width:44px;height:44px;font-size:1.4rem;cursor:pointer;z-index:201;display:flex;align-items:center;justify-content:center;transition:background 0.3s,transform 0.2s;box-shadow:0 4px 16px rgba(196,132,154,0.4)}
.hiring-close:hover{background:var(--rose-dark);transform:rotate(90deg)}

/* Hiring header glass card */
.hiring-header{
  background:rgba(255,255,255,0.18)!important;
  backdrop-filter:blur(40px) saturate(260%) brigh
